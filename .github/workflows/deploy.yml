name: CI/CD Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage flake8
    - name: Run linter
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run tests with coverage
      env:
        DB_NAME: test_db
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_HOST: localhost
        DB_PORT: 5432
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        coverage run manage.py test
        coverage report

  deploy:
    name: Deploy to Yandex Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "�� Starting deployment..."
          cd /var/www/django-rf
          echo "�� Pulling latest changes..."
          git pull origin main
          echo "�� Activating virtual environment..."
          source venv/bin/activate
          echo "�� Installing dependencies..."
          pip install -r requirements.txt
          echo "�� Running migrations..."
          python manage.py migrate --noinput
          echo "�� Collecting static files..."
          python manage.py collectstatic --noinput
          echo "�� Restarting Gunicorn..."
          sudo systemctl restart gunicorn
          echo "�� Restarting Celery..."
          sudo systemctl restart celery || echo "Celery not configured"
          echo "�� Reloading Nginx..."
          sudo systemctl reload nginx
          echo "✅ Deployment completed successfully!"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Check API health
      run: |
          curl -f http://${{ secrets.SERVER_HOST }}/api/courses/ || exit 1
          curl -f http://${{ secrets.SERVER_HOST }}/admin/ || exit 1
